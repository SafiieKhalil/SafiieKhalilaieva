<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Image 1</title>
  <style>
    
    body {
      background: #faf7f0;  
      font-family: Arial, sans-serif;
      padding: 40px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;  
      background: white;
      padding: 40px;
      border-radius: 20px; 
      text-align: center;
    }
    
    h1 {
      color: #8b7355;  
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e8dcca;
    }
    
    img {
      display: block;
      margin: 30px auto;
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      border: 2px solid #e8dcca;
    }
    
    p {
      color: #4a3b2c;
      line-height: 1.6;
      margin: 20px 0 30px 0;
      font-size: 16px;
    }
    
    nav {
      margin-top: 20px;
    }
    
    nav a {
      display: inline-block;
      background: #f0ebe1;
      color: #8b7355;
      text-decoration: none;
      padding: 10px 20px;
      margin: 0 5px;
      border-radius: 10px;
      font-weight: bold;
    }
    
    nav a:hover {
      background: #d4c5b0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Image 1 — 1920×1080</h1>
    
    <img src="image/image1.jpg" alt="Image 1">
    
    <p>I chose this photo because I used the rule of thirds, leading lines, and balance. The subject is off-center to create depth and interest.</p>
